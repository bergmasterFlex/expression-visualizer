<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AST Visualizer 3D — Bevy + WebGL</title>
  <link data-trunk rel="rust" data-wasm-opt="s" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #08081a;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
    }

    #bevy-canvas {
      width: 100%; height: 100%;
      display: block;
      position: absolute;
      top: 0; left: 0;
    }

    /* ── Top bar ─────────────────────────────────── */
    #top-bar {
      position: absolute; top: 0; left: 0; right: 0;
      z-index: 10;
      padding: 14px 20px;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      pointer-events: none;
    }

    #top-bar h1 {
      color: #E8E4DE; font-size: 22px; font-weight: 800;
      letter-spacing: -0.5px;
    }
    #top-bar h1 span.accent { color: #22D3EE; }
    #top-bar h1 span.sub { color: #3A3A50; font-size: 13px; font-weight: 400; }

    #top-bar .subtitle {
      color: #3A3A50; font-size: 10px;
    }
    #top-bar .subtitle .hl { color: #22D3EE; }

    .input-row {
      display: flex; align-items: center; gap: 8px;
      pointer-events: auto;
    }
    .input-row label { color: #4A4A5E; font-size: 11px; }
  </style>
</head>
<body>
  <!-- Bevy renders into this canvas -->
  <canvas id="bevy-canvas"></canvas>

  <!-- UI overlay (HTML, not Bevy) -->
  <div id="top-bar">
    <h1>
      <span class="accent">AST</span> Visualizer
      <span class="sub">3D · Bevy + WebGL</span>
    </h1>
  </div>
</body>
</html>
